<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault - Encrypt. Communicate. Disappear.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
    <div class="header-left">
        <h2>🔐 CipherVault</h2>
    </div>

    <div class="header-right">
        <div><strong>Room ID:</strong> <span id="room-display"></span></div>
        <div><strong>Password:</strong> <span id="password-display"></span></div>
        <div><strong>User:</strong> <span id="user-display"></span></div>

        <button id="leave-btn" class="btn-danger">
            🚪 Leave Room
        </button>
    </div>
</div>

        <div class="chat-main">
            <div class="messages-container" id="messages">
                <!-- Messages appear here -->
            </div>

            <div class="sidebar">
                <h3>Users Online</h3>
                <ul id="user-list"></ul>
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" class="btn-primary">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
